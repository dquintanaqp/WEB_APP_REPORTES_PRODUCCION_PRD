{% extends "layout.html" %}
{% block title %}Login | Reportes Producción{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-head">
      <img class="brand-logo" src="{{ url_for('static', filename='img/quimpac.png') }}" alt="Quimpac" />
      <h1 class="auth-title h4">REPORTES PRODUCCIÓN</h1>
      <div class="auth-subtitle">Portal Corporativo • Gestión de Reportes</div>
    </div>

    <div class="auth-body">
      {% if error %}
        <div class="alert alert-danger py-2 mb-3" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input class="form-control" name="username" placeholder="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input class="form-control" type="password" name="password" placeholder="********" required>
        </div>
        <button class="btn btn-accent w-100">Ingresar al Sistema</button>
      </form>

      <div class="text-center text-muted mt-3" style="font-size:.8rem;">{{ current_year }} Quimpac S.A.</div>
    </div>
  </div>
</div>

{% endblock %}
