<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Reportes Producción{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block head %}{% endblock %}
</head>
<body class="{% if not current_user.is_authenticated %}auth-page{% else %}app-page{% endif %}">

{% if current_user.is_authenticated %}
<header class="app-header py-3">
  <div class="container app-container d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
      <img src="{{ url_for('static', filename='img/quimpac.png') }}" alt="Quimpac" style="height:24px; opacity:.95;"/>
      <div class="app-title">REPORTES PRODUCCIÓN <span class="app-badge">PRD</span></div>
    </div>
    <div class="d-flex align-items-center gap-2">
      <a class="btn btn-light btn-sm" href="{{ url_for('logout') }}">Salir</a>
    </div>
  </div>
</header>
{% endif %}

<main class="container app-container my-4">
  {% block content %}{% endblock %}
</main>

</body>
</html>
